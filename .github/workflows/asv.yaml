name: asv benchmarks

on: [push]

jobs:
  asv-benchmarks:
    runs-on: ubuntu-latest
    env:
      OS_AUTH_URL: ${{ secrets.OPENSTACK_AUTH_URL }}
      OS_USERNAME: ${{ secrets.OPENSTACK_USERNAME }}
      OS_PASSWORD: ${{ secrets.OPENSTACK_PASSWORD }}
      OS_IDENTITY_API_VERSION: 3
      OS_REGION_NAME: UK1
    
    steps:
      - name: Generate constants
        run: |
          echo "SERVER_NAME=$(uuidgen -t)" >> $GITHUB_ENV
          mkdir benchmark-ssh
          ssh-keygen -f benchmark-ssh/id_rsa
          echo "SSH_PUBLIC=$(cat benchmark-ssh/id_rsa.pub)" >> $GITHUB_ENV
      
      - name: Start benchmark server
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.CI_PRIVATE_ACCESS }}
          repository: trexfeathers/ci-private
          event-type: ci-benchmark
          client-payload: '{"server_name": "${{ env.SERVER_NAME }}", "ssh_public": "${{ env.SSH_PUBLIC }}"}'

      - name: Install openstack
        run: |
          sudo apt-get install python-openstackclient python-novaclient -y

      - name: Wait 2mins
        run: sleep 2m
      
      - name: SSH to benchmark server
        run: |
          export SERVER_IP="$(openstack server list --name ${{ env.SERVER_NAME }} -f value -c Networks | grep -oE "[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*")"
          echo $SERVER_IP
          ssh centos@$SERVER_IP -o StrictHostKeyChecking=no -i benchmark-ssh/id_rsa
              
      - name: Install Miniconda
        run: |
          export CONDA_BASE="https://repo.continuum.io/miniconda/Miniconda"
          wget --quiet ${CONDA_BASE}3-latest-Linux-x86_64.sh -O miniconda.sh
          bash miniconda.sh -b -p ${HOME}/miniconda
          export PATH="${HOME}/miniconda/bin:${PATH}"
      
      - name: Install ASV
        run: conda install -c conda-forge asv
      
      - name: Checkout HEAD
        uses: actions/checkout@v2
        with:
          fetch-depth: 2
      
      - name: Test action
        run: asv machine --yes
